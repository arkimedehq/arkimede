<!-- disconnected.svg -->
<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Red glow -->
    <circle cx="128" cy="128" r="70" fill="#EF4444" opacity="0.18" filter="url(#glow)"/>

    <!-- Left node -->
    <circle cx="72" cy="128" r="20" fill="#EF4444"/>

    <!-- Right node -->
    <circle cx="184" cy="128" r="20" fill="#EF4444"/>

    <!-- Broken bridge -->
    <rect x="92" y="112" width="26" height="32" rx="16" fill="#EF4444"/>
    <rect x="138" y="112" width="26" height="32" rx="16" fill="#EF4444"/>

    <!-- Disconnect slash -->
    <path d="M76 180L180 76" stroke="#EF4444" stroke-width="18" stroke-linecap="round"/>
</svg>