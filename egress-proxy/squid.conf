# Squid — egress allowlist for the skills (C1).
#
# The skill subprocesses route the network through this proxy
# (HTTP_PROXY/HTTPS_PROXY). Only the domains in the allowlist are reachable;
# everything else is denied. For HTTPS, Squid sees the CONNECT to host:443 and
# applies the `dstdomain` ACL on the host (no SSL-bump needed).
#
# Allowlist = package registries (install-time) ∪ domains declared by the approved
# skills (`skill.yaml → network:`). The skill domains are auto-generated by the
# backend (EgressSyncService) into the include file below and hot-reloaded by the
# container watcher (squid -k reconfigure) on every approve/enable/scope/remove.

http_port 3128

# ── Package registries (needed at install-time: pip / npm / nix) ────────────────
# NB: no redundant subdomains — squid considers it FATAL to list a domain already
# covered by a parent wildcard (e.g. .cache.nixos.org under .nixos.org).
acl allowed_domains dstdomain .pypi.org .pythonhosted.org
acl allowed_domains dstdomain .npmjs.org .yarnpkg.com
acl allowed_domains dstdomain .githubusercontent.com .github.com
acl allowed_domains dstdomain .nixos.org .nixpkgs.org

# ── Approved skill domains (AUTO-GENERATED) ─────────────────────────────────────
# Written by the backend (EgressSyncService) on the shared volume. Contains
# `acl allowed_domains dstdomain <domain>` lines that add to the ACL above.
# Do NOT edit by hand. Must exist before Squid starts: the container entrypoint
# creates it empty if absent.
include /etc/squid/dynamic/skill-domains.conf

# ── Policy ────────────────────────────────────────────────────────────────────────
acl SSL_ports port 443
acl CONNECT method CONNECT

# No CONNECT (HTTPS) to ports other than 443
http_access deny CONNECT !SSL_ports

# Default-deny: allow ONLY the domains in the allowlist
http_access allow allowed_domains
http_access deny all

# Log: default files in /var/log/squid/ (access.log / cache.log).
# NB: do NOT use stdio:/dev/stdout — squid runs as the 'proxy' user and cannot
# open it (FATAL). Inspect with: docker exec <proxy> tail -f /var/log/squid/access.log
access_log /var/log/squid/access.log
